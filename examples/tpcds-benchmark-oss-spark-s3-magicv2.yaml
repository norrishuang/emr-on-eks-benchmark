apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: tpcds-benchmark-oss-magicv2
  namespace: emr-eks-spark
spec:
  type: Scala
  mode: cluster
  # image: 812046859005.dkr.ecr.us-east-1.amazonaws.com/oss-spark:3.3.3_hadoop_3.3.6_magicv2_benchmark_util
  image: 812046859005.dkr.ecr.us-east-1.amazonaws.com/oss-spark:3.1.2_hadoop_3.3.6_magicv2_benchmark_util
  imagePullPolicy: IfNotPresent
  sparkVersion: 3.3.3
  mainClass: com.amazonaws.eks.tpcds.BenchmarkSQL
  mainApplicationFile: local:///opt/spark/examples/jars/eks-spark-benchmark-assembly-1.0.jar
  arguments:
  # TPC-DS data localtion
    - "s3a://tpcds-bemchmark-bucket-812046859005/BLOG_TPCDS-TEST-3T-partitioned/"
  # results location
    - "s3a://tpcds-bemchmark-bucket-812046859005/OSS_TPCDS-TEST-3T-RESULT"
  # Path to kit in the docker image
    - "/opt/tpcds-kit/tools"
  # Data Format
    - "parquet"
  # Scale factor (in GB)
    - "3000"
  # Number of iterations
    - "1"
  # Optimize queries with hive tables
    - "false"
  # Filter queries, will run all if empty - "q98-v2.4,q99-v2.4,ss_max-v2.4,q95-v2.4"
    - "q1-v2.4,q2-v2.4,q3-v2.4,q5-v2.4" 
  # Logging set to WARN
    - "true"
  hadoopConf:
    # EMRFS filesystem config
    # magicV2
    "mapreduce.outputcommitter.factory.scheme.s3a": "org.apache.hadoop.fs.s3a.commit.S3ACommitterFactory"
    "fs.s3a.committer.magic.enabled": "true"
    "fs.s3a.committer.name": "magicv2"
    "fs.s3a.committer.magic.track.commits.in.memory.enabled": "true"
     
    
  sparkConf:
    "spark.eventLog.enabled": "true"
    "spark.eventLog.dir": "s3://myemr-bucket-01/spark-history-logs/"
    "spark.local.dir": "/data1,/data2,/data3,/data4"
    "spark.network.timeout": "2000s"
    "spark.executor.heartbeatInterval": "300s"
    "spark.hadoop.fs.s3a.downgrade.syncable.exceptions": "true"
    # AQE
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.localShuffleReader.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.adaptive.skewJoin.enabled": "true"
    # "spark.sql.adaptive.logLevel": "WARN"      
    # IRSA for S3 connection
    "spark.kubernetes.executor.podNamePrefix": "oss-spark-tpcds-magicv2"
    # "spark.hadoop.fs.s3a.aws.credentials.provider": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "software.amazon.awssdk.auth.credentials.WebIdentityTokenFileCredentialsProvider"
    "spark.hadoop.fs.s3.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    # "spark.hadoop.mapreduce.fileoutputcommitter.algorithm.version": "2" 
  
    

    "spark.executor.defaultJavaOptions": "-verbose:gc -XX:+UseParallelGC -XX:InitiatingHeapOccupancyPercent=70"

    # selector
    "spark.kubernetes.driver.node.selector.alpha.eksctl.io/nodegroup-name": "spark-benchmark-x86-8xl"
    "spark.kubernetes.executor.node.selector.alpha.eksctl.io/nodegroup-name": "spark-benchmark-x86-8xl"
    # Keep pods in a single AZ 
    # "spark.kubernetes.node.selector.topology.kubernetes.io/zone": "us-east-1b"
    # "spark.kubernetes.node.selector.eks.amazonaws.com/capacityType": "ON_DEMAND"
  volumes:
    - name: spark-local-dir-1
      hostPath:
        path: /local1
    - name: spark-local-dir-2
      hostPath:
        path: /local2
    - name: spark-local-dir-3
      hostPath:
        path: /local3
    - name: spark-local-dir-4
      hostPath:
        path: /local4
  driver:
    cores: 4
    coreLimit: "4.1"
    memory: "10g"
    memoryOverhead: "4096"
    serviceAccount: emr-job-execution-sa
    volumeMounts:
      - name: spark-local-dir-1
        mountPath: /data1
      - name: spark-local-dir-2
        mountPath: /data2
      - name: spark-local-dir-3
        mountPath: /data3
      - name: spark-local-dir-4
        mountPath: /data4       
  executor:
    cores: 4
    coreLimit: "4.3"
    memory: "6g"
    memoryOverhead: "4096"
    # 8 executors per node  
    instances: 10
    serviceAccount: emr-job-execution-sa
    volumeMounts:
      - name: spark-local-dir-1
        mountPath: /data1
      - name: spark-local-dir-2
        mountPath: /data2
      - name: spark-local-dir-3
        mountPath: /data3
      - name: spark-local-dir-4
        mountPath: /data4  